<h1>New Asset</h1>
<form [formGroup]="addAcForm"]>
    <select formControlName="type">
        <option value="aircraft">Aircraft</option>
        <option value="vehicle">Vehicle</option>
    </select>
    <div class="asset-detail">
        <input formControlName="registration_code"/>
        <input formControlName="model" />
        <input formControlName="manufacturer" />
        <input formControlName="max_cargo_load" />
        <input formControlName="max_pax_load" />
        <input formControlName="fuel_capacity" />
    </div>
    <div class="asset-general">
        

    </div>

</form>
